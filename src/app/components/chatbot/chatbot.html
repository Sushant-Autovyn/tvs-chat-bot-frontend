<!-- Floating Button -->
<button class="chat-toggle-btn" (click)="toggleChat()" [class.open]="isOpen">
  <span class="btn-icon">{{ isOpen ? '✕' : '💬' }}</span>
  <span class="btn-label" *ngIf="!isOpen">Support</span>
</button>

<!-- Chat Window -->
<div class="chat-window" [class.visible]="isOpen">

  <!-- Header -->
  <div class="chat-header">
    <div class="header-left">
      <div class="avatar">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
      </div>
      <div class="header-info">
        <span class="header-title">Dealer Support</span>
        <span class="header-status">We’re here to help </span>
      </div>
    </div>
    <button class="close-btn" (click)="toggleChat()">✕</button>
  </div>

  <!-- Chat Area -->
  <div class="messages-container" #messageContainer>
    <div
      *ngFor="let msg of messages"
      class="message-row"
      [class.user-row]="msg.sender === 'user'"
      [class.bot-row]="msg.sender === 'bot'"
    >
      <div class="bot-avatar" *ngIf="msg.sender === 'bot'">T</div>
      <div
        class="message-bubble"
        [class.user-bubble]="msg.sender === 'user'"
        [class.bot-bubble]="msg.sender === 'bot'"
        [innerHTML]="formatText(msg.text)"
      ></div>
    </div>

    <!-- Intake Form -->
    <div class="intake-form" *ngIf="showForm">
      <div class="form-group">
        <label>Username</label>
        <input
          type="text"
          [(ngModel)]="userDetails.username"
          placeholder="Enter your username"
          [class.input-error]="formErrors.username"
        />
        <span class="error-msg" *ngIf="formErrors.username">{{ formErrors.username }}</span>
      </div>

      <div class="form-group">
        <label>Phone Number</label>
        <input
          type="tel"
          [(ngModel)]="userDetails.phone"
          placeholder="Enter your phone number"
          [class.input-error]="formErrors.phone"
        />
        <span class="error-msg" *ngIf="formErrors.phone">{{ formErrors.phone }}</span>
      </div>

      <div class="form-group">
        <label>Email Address</label>
        <input
          type="email"
          [(ngModel)]="userDetails.email"
          placeholder="Enter your email"
          [class.input-error]="formErrors.email"
        />
        <span class="error-msg" *ngIf="formErrors.email">{{ formErrors.email }}</span>
      </div>

      <div class="form-group">
        <label>Describe Your Issue</label>
        <textarea
          [(ngModel)]="userDetails.issue"
          placeholder="Briefly describe what you need help with..."
          rows="3"
          [class.input-error]="formErrors.issue"
        ></textarea>
        <span class="error-msg" *ngIf="formErrors.issue">{{ formErrors.issue }}</span>
      </div>

      <button class="submit-btn" (click)="submitForm()">Submit</button>
    </div>

    <div class="message-row bot-row" *ngIf="isTyping">
      <div class="bot-avatar">T</div>
      <div class="typing-indicator">
        <span></span><span></span><span></span>
      </div>
    </div>
  </div>

  <div class="quick-replies" *ngIf="!showForm && !formSubmitted && quickReplies.length > 0">
    <button
      class="quick-reply-btn"
      *ngFor="let reply of quickReplies"
      (click)="onQuickReply(reply)"
    >
      {{ reply }}
    </button>
  </div>

  <div class="input-area" *ngIf="!showForm && !formSubmitted">
    <input
      type="text"
      [(ngModel)]="userInput"
      (keypress)="onKeyPress($event)"
      placeholder="Type your message..."
      class="message-input"
    />
    <button class="send-btn" (click)="sendMessage()">➤</button>
  </div>

</div>
